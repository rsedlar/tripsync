<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TripSync</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f2faea;color:#1a2e1a;min-height:100vh;font-size:14px}

:root{
  --gym:#3CBE00;--gym-dark:#2a9a00;--gym-dim:#e8f8d8;--gym-glow:#3CBE0025;
  --red:#FF0000;--yellow:#FFDC00;--blue:#009BFF;--orange:#FFA000;--purple:#C80096;
  --bg:#f2faea;--surface:#ffffff;--surface2:#f7fcf2;
  --border:#c8e8a8;--border2:#a0cc70;--muted:#6a9050;--text:#1a2e1a;--text2:#5a8040;
}

/* ── HEADER ── */
.gym-header{background:var(--gym);padding:16px 16px 16px;position:relative}
.gym-header-inner{text-align:center}
.gym-title{font-size:2rem;font-weight:900;color:#fff;letter-spacing:1px;line-height:1}
.gym-sub{font-size:.8rem;color:rgba(255,255,255,.85);margin-top:3px;letter-spacing:.5px}

/* ── LANG SWITCHER ── */
.lang-sw{position:absolute;top:12px;right:14px;display:flex;gap:4px}
.lang-btn{background:rgba(255,255,255,.25);border:1px solid rgba(255,255,255,.5);color:#fff;
  font-size:.78rem;font-weight:700;padding:4px 10px;border-radius:20px;cursor:pointer;
  transition:all .15s;font-family:inherit}
.lang-btn.active{background:#fff;color:var(--gym);border-color:#fff}
.lang-btn:hover:not(.active){background:rgba(255,255,255,.4)}

/* ── TABS ── */
.tabs{display:flex;justify-content:center;gap:3px;padding:10px 12px 8px;flex-wrap:wrap;
  background:#fff;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100;
  box-shadow:0 2px 8px #3CBE0015}
.tab-btn{padding:8px 20px;border-radius:7px;border:1px solid var(--border);background:var(--bg);
  color:var(--text2);cursor:pointer;font-size:.87rem;transition:all .18s;white-space:nowrap;font-family:inherit}
.tab-btn:hover{border-color:var(--gym);color:var(--gym);background:#f0fde8}
.tab-btn.active{background:var(--gym);border-color:var(--gym);color:#fff;font-weight:700}
.tab-btn.active .ti{filter:grayscale(1) brightness(10)}
.tab-btn.disabled{opacity:.35;cursor:not-allowed}

/* ── PAGES ── */
.page{display:none;max-width:960px;margin:0 auto;padding:16px 14px 80px}
.page.active{display:block}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:11px;
  padding:16px 18px;margin-bottom:14px;box-shadow:0 1px 4px #3CBE0012}
.card-title{font-size:.95rem;font-weight:700;color:#1a3a10;margin-bottom:12px;
  display:flex;align-items:center;gap:7px}

/* ── PASSENGER TABLE ── */
.pass-table{width:100%;border-collapse:collapse}
.pass-table th{font-size:.78rem;color:var(--muted);font-weight:600;letter-spacing:.2px;
  padding:6px 8px;text-align:left;border-bottom:1px solid var(--border)}
.pass-row{border-bottom:1px solid #ddf0c8;transition:background .15s}
.pass-row:hover{background:#f0fce6}
.pass-row.inactive{opacity:.45}
.pass-row td{padding:5px 5px}
.pass-num{color:var(--muted);font-size:.78rem;text-align:center;width:28px;user-select:none}

input[type=text],input[type=number],select,input[type=search]{
  background:#fff;border:1px solid #c8e0a8;border-radius:6px;
  color:var(--text);padding:7px 9px;font-size:.85rem;width:100%;
  transition:border-color .18s;font-family:inherit}
input:focus,select:focus{outline:none;border-color:var(--gym);box-shadow:0 0 0 2px var(--gym-glow)}
input::placeholder{color:#aacca0}
select option{background:#fff}

/* ── TOGGLE ── */
.tog{position:relative;display:inline-block;width:40px;height:22px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.tog-slider{position:absolute;inset:0;background:#cce0b8;border-radius:22px;cursor:pointer;transition:.2s}
.tog-slider:before{content:'';position:absolute;height:16px;width:16px;left:3px;bottom:3px;
  background:#80a860;border-radius:50%;transition:.2s}
.tog input:checked+.tog-slider{background:var(--gym)}
.tog input:checked+.tog-slider:before{transform:translateX(18px);background:#fff}

/* ── BUTTONS ── */
.btn{padding:8px 16px;border-radius:7px;border:none;cursor:pointer;font-size:.85rem;font-weight:600;
  transition:all .18s;font-family:inherit}
.btn-primary{background:var(--gym);color:#fff}
.btn-primary:hover{background:var(--gym-dark)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-sm{padding:5px 11px;font-size:.78rem}
.btn-ghost{background:#fff;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--gym);color:var(--gym);background:#f5fce8}
.btn-danger{background:transparent;color:#cc3333;border:1px solid #ff000030;
  padding:4px 9px;font-size:.78rem;border-radius:5px}
.btn-danger:hover{background:#ff00001a}
.btn-big{padding:14px 40px;font-size:1.05rem;border-radius:10px;
  background:linear-gradient(135deg,var(--gym),var(--gym-dark));
  color:#fff;font-weight:700;letter-spacing:.3px;
  box-shadow:0 4px 24px #3CBE0040;border:none;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-big:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 30px #3CBE0060}
.btn-big:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* ── CAR CARD ── */
.car-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;
  padding:14px 16px;margin-bottom:10px}
.car-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.car-num{background:var(--orange);color:#fff;width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;
  flex-shrink:0;box-shadow:0 2px 6px #FFA00040}
.car-detect{font-size:.75rem;margin-top:3px}
.car-detect.found{color:var(--gym-dark)}
.car-detect.hint{color:var(--muted)}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:8px}
.form-group{display:flex;flex-direction:column;gap:3px}
.form-label{font-size:.72rem;color:var(--muted);font-weight:600;letter-spacing:.2px}
.check-row{display:flex;align-items:center;gap:7px;font-size:.85rem;cursor:pointer}
.check-row input[type=checkbox]{width:15px;height:15px;accent-color:var(--gym);cursor:pointer}

/* ── BADGES ── */
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:.72rem;font-weight:600}
.badge-green {background:#d8f5d0;color:#1a6010}
.badge-blue  {background:#d0eaff;color:#005080}
.badge-yellow{background:#fff6c8;color:#7a5a00}
.badge-red   {background:#ffe0e0;color:#8a0000}
.badge-orange{background:#fff0d0;color:#8a4000}
.badge-purple{background:#f0e0ff;color:#600080}
.badge-gray  {background:#e8f0e0;color:var(--text2)}

/* ── SETTINGS ── */
.pair-item{background:var(--bg);border:1px solid var(--border);border-radius:8px;
  padding:10px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.divider{height:1px;background:var(--border);margin:16px 0}

/* ── RESULTS ── */
.variant-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  margin-bottom:18px;overflow:hidden;box-shadow:0 2px 8px #3CBE0015}
.variant-header{padding:16px 20px;border-bottom:2px solid var(--border);display:flex;
  align-items:center;gap:12px;flex-wrap:wrap;background:#edf8e0;
  box-shadow:inset 0 -1px 0 var(--border2)}
.variant-badge{padding:6px 16px;border-radius:20px;font-size:.92rem;font-weight:700;
  color:#fff;letter-spacing:.2px;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.var-1{background:var(--blue)}.var-2{background:var(--gym)}
.var-3{background:var(--orange)}.var-4{background:var(--purple)}
.variant-desc{font-size:.88rem;color:#4a7030;font-weight:500}
.variant-stats{display:flex;gap:16px;flex-wrap:wrap;font-size:.88rem;font-weight:600;
  color:#3a6020;margin-left:auto}
.variant-body{padding:14px 18px}
.car-assign{background:var(--bg);border:1px solid var(--border);border-radius:9px;
  margin-bottom:10px;overflow:hidden}
.ca-header{padding:10px 14px;background:#ebf8de;display:flex;align-items:center;
  gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.ca-name{font-weight:700;font-size:.9rem;flex:1;color:#1a3a10}
.ca-meta{font-size:.78rem;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap}
.ca-body{padding:10px 14px}
.route-stop{display:flex;align-items:flex-start;gap:10px;padding:5px 0;position:relative}
.route-stop:not(:last-child):after{content:'';position:absolute;left:13px;top:28px;
  width:2px;height:calc(100% - 8px);background:var(--border)}
.stop-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0;margin-top:1px}
.sd-start {background:#ffe8c0;color:#a05000}
.sd-pickup{background:#d0f0e0;color:#0a6a30}
.sd-dest  {background:#d8f5b8;color:#3a7000}
.stop-info .city{font-weight:600;font-size:.88rem;color:#1a3a10}
.stop-info .ppl{font-size:.75rem;color:var(--muted);margin-top:2px}
.km-tag{font-size:.72rem;color:#8aaa6a;margin-left:auto;flex-shrink:0;align-self:center}
.summary-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:8px;margin-bottom:18px}
.sstat{background:var(--surface);border:1px solid var(--border);border-radius:9px;
  padding:12px;text-align:center}
.sstat .n{font-size:1.5rem;font-weight:700;color:var(--gym-dark)}
.sstat .l{font-size:.72rem;color:var(--muted);margin-top:2px}
.warning-box{background:#fff0f0;border:1px solid #ffaaaa;border-radius:9px;
  padding:12px 15px;font-size:.85rem;color:#aa2222;margin-bottom:14px}
.info-box{background:#edfce0;border:1px solid var(--border2);border-radius:9px;
  padding:12px 15px;font-size:.83rem;color:#2a6a10;margin-bottom:14px}
.empty{text-align:center;padding:28px;color:#8aaa80;font-size:.88rem}
.empty .ei{font-size:2.2rem;margin-bottom:8px}
.btn-center{text-align:center;margin:20px 0}
.recalc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}

/* ── DEMO BUTTON ── */
.demo-btn{background:none;border:none;color:#9ab890;font-size:.75rem;cursor:pointer;
  padding:2px 6px;border-radius:5px;transition:color .15s;font-family:inherit}
.demo-btn:hover{color:var(--gym-dark)}

@media(max-width:600px){
  .pass-table th:nth-child(n+5),.pass-row td:nth-child(n+5){display:none}
  .gym-title{font-size:1.4rem}
  .lang-sw{top:8px;right:8px}
}
</style>
</head>
<body>

<option value="Pelhřimov"><option value="Boskovice"><option value="Kuřim"><option value="Tišnov">
</datalist>

<!-- ═══════════════ HEADER ═══════════════ -->
<div class="gym-header">
  <div class="lang-sw">
    <button class="lang-btn active" id="btn-cs" onclick="setLang('cs')">🇨🇿 CZ</button>
    <button class="lang-btn" id="btn-en" onclick="setLang('en')">🇬🇧 EN</button>
  </div>
  <div class="gym-header-inner">
    <div class="gym-title">🚗 TripSync</div>
    <div class="gym-sub" data-i18n="sub"></div>
  </div>
</div>

<!-- ═══════════════ TABS ═══════════════ -->
<div class="tabs">
  <button class="tab-btn active" id="tab-passengers" onclick="switchTab('passengers')"><span class="ti">👥</span> <span data-i18n="tab_pass"></span></button>
  <button class="tab-btn" id="tab-cars" onclick="switchTab('cars')"><span class="ti">🚗</span> <span data-i18n="tab_cars"></span></button>
  <button class="tab-btn" id="tab-settings" onclick="switchTab('settings')"><span class="ti">⚙️</span> <span data-i18n="tab_set"></span></button>
  <button class="tab-btn disabled" id="tab-results" onclick="switchTab('results')"><span class="ti">🗺️</span> <span data-i18n="tab_res"></span></button>
</div>

<!-- ═══════════════ TAB 1: CESTUJÍCÍ / PASSENGERS ═══════════════ -->
<div id="page-passengers" class="page active">
  <div class="card">
    <div class="card-title">
      👥 <span data-i18n="pass_title"></span>
      <span style="font-size:.78rem;font-weight:400;color:var(--muted);margin-left:auto" data-i18n="pass_max"></span>
      <button class="demo-btn" onclick="fillDemo('passengers')" data-i18n="demo_btn"></button>
    </div>
    <div style="overflow-x:auto">
    <table class="pass-table">
      <thead><tr>
        <th style="width:28px">#</th>
        <th data-i18n="col_name"></th>
        <th style="width:70px;text-align:center" data-i18n="col_going"></th>
        <th data-i18n="col_home"></th>
        <th data-i18n="col_alt1"></th>
        <th data-i18n="col_alt2"></th>
        <th style="width:36px"></th>
      </tr></thead>
      <tbody id="pass-tbody"></tbody>
    </table>
    </div>
    <div style="margin-top:10px;font-size:.78rem;color:var(--muted);background:#f0fce8;border-radius:6px;padding:6px 10px;border-left:3px solid var(--gym)" data-i18n="pass_hint"></div>
  </div>
  <div id="pass-summary" style="font-size:.82rem;color:var(--gym-dark);font-weight:600;text-align:right;margin-top:-6px"></div>
</div>

<!-- ═══════════════ TAB 2: AUTA / CARS ═══════════════ -->
<div id="page-cars" class="page">
  <div style="text-align:right;margin-bottom:6px">
    <button class="demo-btn" onclick="fillDemo('cars')" data-i18n="demo_btn"></button>
  </div>
  <div id="cars-container"></div>
  <div class="btn-center">
    <button class="btn btn-primary" onclick="addCar()" id="add-car-btn" data-i18n="add_car"></button>
    <div style="font-size:.78rem;color:var(--muted);margin-top:6px" id="max-cars-hint"></div>
  </div>
  <div class="card" style="margin-top:18px">
    <div class="card-title">⛽ <span data-i18n="fuel_title"></span></div>
    <p style="font-size:.82rem;color:var(--muted);margin-bottom:10px" data-i18n="fuel_desc"></p>
    <div class="form-group" style="max-width:280px">
      <label class="form-label" data-i18n="fuel_label"></label>
      <select id="fuel-overhead">
        <option value="0"  data-i18n-opt="fuel_0"></option>
        <option value="20" selected data-i18n-opt="fuel_20"></option>
        <option value="40" data-i18n-opt="fuel_40"></option>
        <option value="60" data-i18n-opt="fuel_60"></option>
        <option value="80" data-i18n-opt="fuel_80"></option>
        <option value="100" data-i18n-opt="fuel_100"></option>
      </select>
    </div>
  </div>
</div>

<!-- ═══════════════ TAB 3: NASTAVENÍ / SETTINGS ═══════════════ -->
<div id="page-settings" class="page">
  <div style="text-align:right;margin-bottom:6px">
    <button class="demo-btn" onclick="fillDemo('settings')" data-i18n="demo_btn"></button>
  </div>

  <div class="card">
    <div class="card-title">📍 <span data-i18n="dest_title"></span></div>
    <div class="form-row">
      <div class="form-group" style="grid-column:span 2">
        <label class="form-label" data-i18n="dest_label"></label>
        <div style="display:flex;gap:8px">
          <input type="text" id="dest-input" style="flex:1" data-i18n-ph="dest_ph">
          <button class="btn btn-ghost btn-sm" onclick="geocodeDest()" data-i18n="dest_find"></button>
        </div>
      </div>
    </div>
    <div id="dest-result" style="font-size:.8rem;margin-top:6px"></div>
  </div>

  <div class="card">
    <div class="card-title">🔗 <span data-i18n="pair_title"></span></div>
    <p style="font-size:.82rem;color:var(--muted);margin-bottom:12px" data-i18n="pair_desc"></p>
    <div style="display:flex;align-items:flex-end;gap:8px;flex-wrap:wrap;margin-bottom:8px">
      <div class="form-group" style="flex:1;min-width:120px">
        <label class="form-label" data-i18n="pair_p1"></label>
        <select id="pair-p1"></select>
      </div>
      <div class="form-group" style="flex:1;min-width:120px">
        <label class="form-label" data-i18n="pair_p2"></label>
        <select id="pair-p2"></select>
      </div>
      <div class="form-group" style="flex:1;min-width:120px">
        <label class="form-label" data-i18n="pair_p3"></label>
        <select id="pair-p3"></select>
      </div>
      <button class="btn btn-primary" onclick="addPair()" style="flex-shrink:0;white-space:nowrap;background:var(--gym-dark)" data-i18n="pair_add"></button>
    </div>
    <div id="pairs-list"></div>
    <label class="check-row" style="margin-top:10px">
      <input type="checkbox" id="pair-return">
      <span data-i18n="pair_return"></span>
    </label>
  </div>

  <div class="card">
    <div class="card-title">⏩ <span data-i18n="early_title"></span></div>
    <p style="font-size:.82rem;color:var(--muted);margin-bottom:12px" data-i18n="early_desc"></p>
    <div style="display:flex;align-items:flex-end;gap:8px;flex-wrap:wrap;margin-bottom:8px">
      <div class="form-group" style="flex:1;min-width:120px">
        <label class="form-label" data-i18n="early_p1"></label>
        <select id="early-p1"></select>
      </div>
      <div class="form-group" style="flex:1;min-width:120px">
        <label class="form-label" data-i18n="early_p2"></label>
        <select id="early-p2"></select>
      </div>
      <div class="form-group" style="flex:1;min-width:120px">
        <label class="form-label" data-i18n="early_p3"></label>
        <select id="early-p3"></select>
      </div>
      <button class="btn btn-primary" onclick="addToEarlyGroup()" style="flex-shrink:0;white-space:nowrap;background:var(--gym-dark)" data-i18n="early_add"></button>
    </div>
    <div id="early-list"></div>
  </div>

  <div class="card">
    <div class="card-title">🔄 <span data-i18n="ret_title"></span></div>
    <label class="check-row">
      <input type="checkbox" id="return-mix" checked>
      <span data-i18n="ret_mix"></span>
    </label>
    <p style="font-size:.78rem;color:var(--muted);margin-top:8px" data-i18n="ret_hint"></p>
  </div>

  <div class="card" style="margin-top:4px">
    <div class="card-title">⛽ <span data-i18n="fp_title"></span></div>
    <div class="btn-center" style="margin:0 0 14px">
      <button class="btn btn-primary" onclick="fetchFuelPrices()" style="background:var(--gym-dark);font-size:.95rem;padding:11px 28px" data-i18n="fp_btn"></button>

let lang = 'cs';
function t(k){ const v=(LANG[lang]||LANG.cs)[k]; return v!==undefined?v:k; }

function setLang(l) {
  lang = l;
  document.documentElement.lang = l;
  document.getElementById('btn-cs').classList.toggle('active', l==='cs');
  document.getElementById('btn-en').classList.toggle('active', l==='en');
  // update static data-i18n elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = t(el.dataset.i18n);
    if(typeof v === 'string') el.textContent = v;
  });
  // update placeholders
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    const v = t(el.dataset.i18nPh);
    if(typeof v === 'string') el.placeholder = v;
  });
  // update select options
  document.querySelectorAll('[data-i18n-opt]').forEach(el => {
    const v = t(el.dataset.i18nOpt);
    if(typeof v === 'string') el.textContent = v;
  });
  // re-render dynamic parts
  renderPassengerTable();
  if(document.getElementById('page-cars').classList.contains('active')) renderCars();
  renderPairs();
  updatePassSummary();
  updateDestDisplay();
}

function updateFuelPriceManual(type, val) {
  const v = parseFloat(val);
  if(!isNaN(v) && v > 10 && v < 100) {
    state.fuelPrices[type] = v;
    state.fuelPrices.date = new Date().toLocaleDateString('cs-CZ');
  } else {
    state.fuelPrices[type] = null;
  }
}

async function fetchFuelPrices() {
  const statusEl = document.getElementById('fp-status');
  if(!statusEl) return;
  statusEl.innerHTML = `<span style="color:var(--muted)">${t('fp_loading')}</span>`;

  // Helper: find first number in text that looks like a fuel price (25–65 Kč/l)
  function firstFuelPrice(text) {
    const re = /(\d{2,3})[.,](\d{1,3})/g;
    let m;
    while((m = re.exec(text)) !== null) {
      const v = parseFloat(m[1] + '.' + m[2]);
      if(v >= 25 && v <= 65) return v;
    }
    return null;
  }

  // Helper: try to apply kurzy.cz parsing on HTML
  function parseKurzy(html) {
    if(!html || html.length < 200) return null;
    const benzIdx = html.search(/[Bb]enzin/);
    const naftIdx = html.search(/[Nn]afta/);
    if(benzIdx < 0 || naftIdx < 0) return null;
    const petrol = firstFuelPrice(html.slice(benzIdx, benzIdx + 3000));
    const diesel = firstFuelPrice(html.slice(naftIdx, naftIdx + 3000));
    if(!petrol || !diesel) return null;
    const dateMatch = html.slice(Math.max(0, benzIdx - 200), benzIdx + 3000).match(/(\d{2}\.\d{2}\.\d{4})/);
    const srcDate = dateMatch ? dateMatch[1] : new Date().toLocaleDateString('cs-CZ');
    return {petrol, diesel, date: srcDate};
  }

  // Helper: try to apply CCS.cz parsing on HTML (fallback)
  function parseCCS(html) {
    if(!html || html.length < 200) return null;
    const natMatch  = html.match(/[Nn]atural[^]*?(\d{2})[,.](\d{2})/);
    const diesMatch = html.match(/[Dd]iesel[^]*?(\d{2})[,.](\d{2})/);
    const petrol = natMatch  ? parseFloat(natMatch[1]+'.'+natMatch[2])   : null;
    const diesel = diesMatch ? parseFloat(diesMatch[1]+'.'+diesMatch[2]) : null;
    if(!petrol || !diesel || petrol<20 || petrol>80 || diesel<20 || diesel>80) return null;
    return {petrol, diesel, date: new Date().toLocaleDateString('cs-CZ')};
  }

  // Ordered list of attempts: [proxyFn, targetUrl, parserFn]
  const attempts = [
    [u => `https://corsproxy.io/?${encodeURIComponent(u)}`,             'https://www.kurzy.cz/komodity/benzin-nafta-cena/', parseKurzy],
    [u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`, 'https://www.kurzy.cz/komodity/benzin-nafta-cena/', parseKurzy],
    [u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`, 'https://www.kurzy.cz/komodity/benzin-nafta-cena/', parseKurzy],
    [u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`, 'https://www.ccs.cz/sluzby/ceny-pohonnych-hmot/', parseCCS],
  ];

  for(const [proxyFn, targetUrl, parseFn] of attempts) {
    try {
      const res = await fetch(proxyFn(targetUrl), {signal: AbortSignal.timeout(8000)});
      if(!res.ok) continue;
      const html = await res.text();
      const result = parseFn(html);
      if(!result) continue;
      const {petrol, diesel, date: srcDate} = result;
      state.fuelPrices = {petrol, diesel, date: srcDate};
      const pEl=document.getElementById('fp-petrol-input'), dEl=document.getElementById('fp-diesel-input');
      if(pEl) pEl.value = petrol.toFixed(2).replace('.',',');
      if(dEl) dEl.value = diesel.toFixed(2).replace('.',',');
      const dateStr = t('fp_date')(srcDate);
      const pdEl=document.getElementById('fp-petrol-date'), ddEl=document.getElementById('fp-diesel-date');
      if(pdEl) pdEl.textContent = dateStr;
      if(ddEl) ddEl.textContent = dateStr;
      statusEl.innerHTML=`<span style="color:var(--gym-dark);font-weight:600">${t('fp_ok')} — ${petrol.toFixed(2).replace('.',',')} / ${diesel.toFixed(2).replace('.',',')} Kč/l (${srcDate})</span>`;
      return;
    } catch(e) { /* try next */ }
  }
  // All attempts failed
  statusEl.innerHTML=`<span style="color:#b87000">${t('fp_fail')}</span>`;
}

function switchTab(name) {
  if (document.getElementById('tab-'+name).classList.contains('disabled')) return;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if (name==='settings') refreshPairSelects();
  if (name==='cars') renderCars();
}

function addPassengerRows(n) {
  for(let i=0;i<n;i++) state.passengers.push({id:state.nextId++,name:'',going:true,city1:'',city2:'',city3:''});
}

function renderPassengerTable() {
  document.getElementById('pass-tbody').innerHTML =
    state.passengers.map((p,i)=>renderPassRow(p,i)).join('');
  updatePassSummary();
}

function renderPassRow(p,i) {
  const inactive = !p.going?'inactive':'';
  const cityInputs = p.going
    ? `<td><input type="text" list="cz-cities" value="${esc(p.city1)}" placeholder="${t('ph_city')}" oninput="updatePass(${p.id},'city1',this.value)"></td>
       <td><input type="text" list="cz-cities" value="${esc(p.city2)}" placeholder="${t('ph_city_opt')}" oninput="updatePass(${p.id},'city2',this.value)"></td>
       <td><input type="text" list="cz-cities" value="${esc(p.city3)}" placeholder="${t('ph_city_opt')}" oninput="updatePass(${p.id},'city3',this.value)"></td>`
    : `<td colspan="3" style="padding:5px 8px;font-size:.78rem;color:var(--muted)">${t('not_going')}</td>`;
  return `<tr class="pass-row ${inactive}" id="prow-${p.id}">
    <td class="pass-num">${i+1}</td>
    <td><input type="text" value="${esc(p.name)}" placeholder="${t('ph_name')}" oninput="updatePass(${p.id},'name',this.value)"></td>
    <td style="text-align:center">
      <label class="tog"><input type="checkbox" ${p.going?'checked':''} onchange="updatePass(${p.id},'going',this.checked)">
      <span class="tog-slider"></span></label>
    </td>
    ${cityInputs}
    <td><button class="btn-danger" onclick="deletePass(${p.id})">✕</button></td>
  </tr>`;
}

function updatePass(id,field,value) {
  const p=state.passengers.find(x=>x.id===id); if(!p) return;
  if(field==='going') value=!!value;
  p[field]=value;
  if(field==='name') {
    const idx=state.passengers.indexOf(p);
    if(value.trim()&&idx===state.passengers.length-1&&state.passengers.length<30) {
      addPassengerRows(1);
      document.getElementById('pass-tbody').insertAdjacentHTML('beforeend',
        renderPassRow(state.passengers[state.passengers.length-1], state.passengers.length-1));
    }
    updatePassSummary(); return;
  }
  if(field==='city1'||field==='city2'||field==='city3') { updatePassSummary(); return; }
  if(field==='going') {
    const idx=state.passengers.indexOf(p);
    const old=document.getElementById('prow-'+id);
    if(old){ const tb=document.createElement('tbody'); tb.innerHTML=renderPassRow(p,idx); old.parentNode.replaceChild(tb.firstElementChild,old); }
    updatePassSummary(); return;
  }
  renderPassengerTable();
}

function deletePass(id) {
  state.passengers=state.passengers.filter(p=>p.id!==id);
  state.pairs=state.pairs.filter(r=>r.p1id!==id&&r.p2id!==id&&r.p3id!==id);
  if(state.passengers.length<3) addPassengerRows(3-state.passengers.length);
  renderPassengerTable();
}

function updatePassSummary() {
  const named=state.passengers.filter(p=>p.name.trim());
  const going=named.filter(p=>p.going);
  const el=document.getElementById('pass-summary');
  if(el) el.textContent = named.length ? t('summary')(named.length, going.length, named.length-going.length) : '';
}

  const going=state.passengers.filter(p=>p.going&&p.name.trim());
  const max=Math.max(1,Math.floor(going.length/2));
  if(state.cars.length>=max){alert(t('alert_maxcars')(max,going.length));return;}
  state.cars.push({id:state.nextId++,nameInput:'',model:'',totalSeats:5,consumption:6.0,isEv:false,fuelType:'petrol',driverId:null,luggage:'trunk',comfort:false});
  renderCars();
}

function deleteCar(id) { state.cars=state.cars.filter(c=>c.id!==id); renderCars(); }

function effectiveCapacity(car) {
  let c=car.totalSeats; if(car.luggage==='seats') c--; if(car.comfort) c--; return Math.max(1,c);
}

  if(!el) return;
  if(!state.cars.length){el.innerHTML=`<div class="empty"><div class="ei">🚙</div>${t('no_cars')}</div>`;return;}
  const driverOpts=going.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
  el.innerHTML=state.cars.map((car,i)=>{

      <div class="car-header">

          ${det}
        </div>
        <button class="btn-danger" onclick="deleteCar(${car.id})">${t('car_remove')}</button>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">${t('lbl_driver')}</label>
          <select onchange="updateCar(${car.id},'driverId',+this.value)">
            <option value="">${t('no_driver')}</option>
            ${driverOpts.replace(`value="${sel}"`,`value="${sel}" selected`)}
          </select></div>
        <div class="form-group"><label class="form-label">${t('lbl_luggage')}</label>
          <select onchange="updateCar(${car.id},'luggage',this.value)">${lugOpts}</select></div>
        <div class="form-group"><label class="form-label">${t('lbl_seats')}</label>
          <input id="car-seats-${car.id}" type="number" min="2" max="12" value="${car.totalSeats}" oninput="updateCar(${car.id},'totalSeats',+this.value)"></div>
        <div class="form-group"><label class="form-label">${t('lbl_cons')}</label>
          <input id="car-cons-${car.id}" type="number" min="0" max="30" step="0.1" value="${car.isEv?0:car.consumption}" ${car.isEv?'disabled':''} oninput="updateCar(${car.id},'consumption',+this.value)"></div>
        ${!car.isEv?`<div class="form-group"><label class="form-label">${t('lbl_fueltype')}</label><div id="car-ft-${car.id}">${fuelTypeSelector(car)}</div></div>`:''}
      </div>
      <label class="check-row" style="margin-top:4px">
        <input type="checkbox" ${car.comfort?'checked':''} onchange="updateCar(${car.id},'comfort',this.checked)">

        <span id="car-effcap-${car.id}" class="badge ${effCap<car.totalSeats?'badge-yellow':'badge-green'}" style="margin-left:8px">${t('lbl_capacity')}: ${effCap}</span>

  }).join('');
}

function updateEffCapBadge(car) {
  const e=effectiveCapacity(car), el=document.getElementById('car-effcap-'+car.id);
  if(el){el.textContent=`${t('lbl_capacity')}: ${e}`;el.className=`badge ${e<car.totalSeats?'badge-yellow':'badge-green'}`;el.style.marginLeft='8px';}
}

function detectFuelType(nameInput) {
  if(!nameInput) return 'petrol';
  const n=nameInput.toLowerCase();
  if(/\btdi\b|\btde\b|\bcdi\b|\bcdti\b|\bhdi\b|\bcrdi\b|\bd4d\b|\bdci\b|\btdci\b|\b[12]\.[0-9]d\b|diesel|nafta/i.test(n)) return 'diesel';
  return 'petrol';
}

function updateCarName(id,val) {
  const car=state.cars.find(c=>c.id===id); if(!car) return;
  car.nameInput=val;
  const lower=val.toLowerCase();
  let matched=null;
  for(const e of CAR_DB){if(e.k.some(k=>lower.includes(k))){matched=e;break;}}
  const ps=car.totalSeats,pc=car.consumption,pe=car.isEv;
  if(matched){car.model=matched.m;car.totalSeats=matched.s;car.consumption=matched.c;car.isEv=!!matched.ev;}
  else car.model='';
  if(!car.isEv) car.fuelType=detectFuelType(val);
  else car.fuelType='electric';
  const det=document.getElementById('car-detect-'+id);
  if(det){
    if(car.model){det.className='car-detect found';det.textContent=t('car_detect_found')(car.model,car.totalSeats,car.isEv,car.consumption);}
    else{det.className='car-detect hint';det.textContent=t('car_detect_hint');}
  }
  if(car.totalSeats!==ps){const e=document.getElementById('car-seats-'+id);if(e)e.value=car.totalSeats;}
  if(car.consumption!==pc||car.isEv!==pe){const e=document.getElementById('car-cons-'+id);if(e){e.value=car.isEv?0:car.consumption;e.disabled=car.isEv;}}
  // update fuel type badge if shown
  const ftEl=document.getElementById('car-ft-'+id);
  if(ftEl&&!car.isEv){
    ftEl.innerHTML=fuelTypeSelector(car);
  }
  updateEffCapBadge(car);
}

function fuelTypeSelector(car){
  if(car.isEv) return '';
  const p=car.fuelType==='petrol'?'selected':'';
  const d=car.fuelType==='diesel'?'selected':'';
  return `<select style="width:auto;padding:5px 8px;font-size:.8rem" onchange="updateCar(${car.id},'fuelType',this.value)">
    <option value="petrol" ${p}>${t('ft_petrol')}</option>
    <option value="diesel" ${d}>${t('ft_diesel')}</option>
  </select>`;
}

function updateCar(id,field,val) {
  const car=state.cars.find(c=>c.id===id); if(!car) return;
  car[field]=val;
  if(['totalSeats','luggage','comfort'].includes(field)) updateEffCapBadge(car);
}

function addPair() {
  const p1=parseInt(document.getElementById('pair-p1').value)||0;
  const p2=parseInt(document.getElementById('pair-p2').value)||0;
  const p3=parseInt(document.getElementById('pair-p3').value)||0;
  if(!p1||!p2){alert(t('alert_sel2'));return;}

// ─────────────────────────────────────────────
//  HAVERSINE
// ─────────────────────────────────────────────
//  GEOGRAPHIC RULES
// ─────────────────────────────────────────────
// Cars departing from these districts must NOT make additional stops
// in the forbidden districts. Hard block — no exceptions.
// "Same city as driver start" is always allowed (no detour at all).
const MORAVIA_ORIGINS = new Set([
  'Brno','Uherské Hradiště','Olomouc','Zlín','Hodonín','Břeclav','Kroměříž',
  'Vsetín','Prostějov','Přerov','Ostrava','Opava','Frýdek-Místek','Znojmo',
  'Karviná','Havířov','Šumperk','Jeseník','Nový Jičín',
  'Pelhřimov'  // extended rule: Pelhřimov drivers also cannot stop in forbidden cities
]);
const BOHEMIA_FORBIDDEN = new Set([
  'Praha','Plzeň',
  'Pelhřimov'  // extended rule: forbidden as an additional stop for the above drivers
]);

// Returns true when a driver from driverCity must NOT stop in pickupCity.
// Exception: driver's own starting city is never forbidden (zero detour).
function isForbiddenPickup(driverCity, pickupCity) {
  if(!driverCity || !pickupCity) return false;
  if(pickupCity === driverCity) return false; // same city as start → always allowed
  return MORAVIA_ORIGINS.has(driverCity) && BOHEMIA_FORBIDDEN.has(pickupCity);
}

// Returns true when ALL of passenger p's pickup options are forbidden for driverCity
// (= this car physically cannot serve this passenger at any of their locations)
function isForbiddenAssignment(p, driverCity) {
  if(!driverCity || !MORAVIA_ORIGINS.has(driverCity)) return false;
  const opts = pickupOptions(p);
  if(!opts.length) return false; // no city → always assignable
  // Forbidden only when every available pickup city is in the blocked set
  // (driver's own city is exempt — passenger already "there" at start)
  return opts.every(c => c !== driverCity && BOHEMIA_FORBIDDEN.has(c));
}

// ─────────────────────────────────────────────
// Road correction factor: straight-line (Haversine) × 1.35 ≈ actual road distance.
// Calibrated from real routes: Praha→Schladming 411 km, Pelhřimov→Schladming 360 km,
// UH+Brno→Schladming 500 km (all vs Google Maps).
// Applied only in calcRouteKm (displayed distances & fuel); routing comparisons use raw Haversine.
const ROAD_FACTOR = 1.35;

function haversine(a,b) {
  if(!a||!b) return 0;
  const R=6371,dLat=(b.lat-a.lat)*Math.PI/180,dLng=(b.lng-a.lng)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.asin(Math.sqrt(x));
}
function getCoords(n){return n?CITY_COORDS[n]||null:null;}
function pickupOptions(p){return [p.city1,p.city2,p.city3].filter(Boolean);}
function minPickupDist(p,fromCity){
  const fc=getCoords(fromCity);if(!fc)return 9999;
  let mn=Infinity;
  for(const c of pickupOptions(p)){const co=getCoords(c);if(co)mn=Math.min(mn,haversine(fc,co));}
  return mn===Infinity?9999:mn;
}
// Detour: extra km to pick up passenger p for a car starting at fromCity going to dest.
// Adds a large penalty (5000) when the pickup is in the WRONG direction —
// i.e., the pickup city is significantly further from the destination than the driver's start.
// This prevents sending UH cars to Plzeň or Brno cars to Praha.
function pickupDetour(p,fromCity,dest){
  const fc=getCoords(fromCity);if(!fc)return 9999;
  const direct=haversine(fc,dest);
  let mn=Infinity;
  // Iterate with index so we can penalise alternatives: city2 +50 km, city3 +100 km
  const ALT_PENALTY=[0,50,100];
  [p.city1,p.city2,p.city3].forEach((c,idx)=>{
    if(!c)return;
    const co=getCoords(c);if(!co)return;
    if(isForbiddenPickup(fromCity,c))return; // hard geographic rule: Moravia→Bohemia forbidden
    const toDest=haversine(co,dest);
    let detour=Math.max(0,haversine(fc,co)+toDest-direct);
    // Wrong direction: pickup is >25% further from destination than driver's start → big penalty
    if(toDest>direct*1.25) detour+=5000;
    // Prefer primary city (Bydliště): penalise alt pickups
    detour+=ALT_PENALTY[idx];
    mn=Math.min(mn,detour);
  });
  return mn===Infinity?99999:mn; // 99999 = no valid pickup exists (hard block)
}

// ─────────────────────────────────────────────
//  OPTIMIZATION
// ─────────────────────────────────────────────
function buildGroups(ppl,pairs) {
  const ids=ppl.map(p=>p.id), par={};
  ids.forEach(id=>par[id]=id);
  function find(x){return par[x]===x?x:(par[x]=find(par[x]));}
  function unite(a,b){if(ids.includes(a)&&ids.includes(b))par[find(a)]=find(b);}
  pairs.forEach(r=>{
    unite(r.p1id,r.p2id);
    if(r.p3id){unite(r.p1id,r.p3id);} // ensures all three share same root
  });
  const g={};
  ppl.forEach(p=>{const root=find(p.id);(g[root]=g[root]||[]).push(p);});
  return Object.values(g).sort((a,b)=>b.length-a.length);
}

function optimizeRoute(driverCity,pickupCities,dest) {
  let rem=[...new Set(pickupCities.filter(c=>c&&c!==driverCity))];
  const route=driverCity?[driverCity]:[];
  let cur=getCoords(driverCity)||dest;
  while(rem.length){
    let near=rem[0],nd=Infinity;
    rem.forEach(c=>{const co=getCoords(c);if(!co)return;const d=haversine(cur,co);if(d<nd){nd=d;near=c;}});
    route.push(near); cur=getCoords(near)||cur; rem=rem.filter(c=>c!==near);
  }
  route.push('__DEST__'); return route;
}

function calcRouteKm(route,dest) {
  let km=0;
  for(let i=0;i<route.length-1;i++){
    const a=route[i]==='__DEST__'?dest:getCoords(route[i]);
    const b=route[i+1]==='__DEST__'?dest:getCoords(route[i+1]);
    km+=haversine(a,b);
  }
  return Math.round(km * ROAD_FACTOR);
}

// Direction-aware route optimizer: picks the next stop that minimizes
// dist(current→pickup) + dist(pickup→dest) with a heavy penalty for
// stops that are "behind" the driver (further from dest than driver's start).
// Returns { route, chosen }.
function optimizeRouteFlex(driverCity,passengers,dest) {
  const chosen={};
  let rem=[...passengers];
  const route=driverCity?[driverCity]:[];
  let cur=getCoords(driverCity)||dest;
  const driverDist=getCoords(driverCity)?haversine(getCoords(driverCity),dest):9999;
  while(rem.length){
    let bestPass=null,bestCity=null,bestScore=Infinity;
    for(const p of rem){
      const opts=pickupOptions(p);
      if(!opts.length){
        if(bestPass===null){bestPass=p;bestCity=null;bestScore=Infinity;}
        continue;
      }
      // Iterate with index to prefer primary city over alternatives
      const ALT_PENALTY=[0,50,100];
      [p.city1,p.city2,p.city3].forEach((c,idx)=>{
        if(!c)return;
        if(c===driverCity){
          // Same city as driver start: free pickup, but still prefer city1 if tie
          const s=ALT_PENALTY[idx]; // 0 for city1, higher for alts even at start
          if(s<bestScore){bestScore=s;bestPass=p;bestCity=c;}
          return;
        }
        const co=getCoords(c);if(!co)return;
        if(isForbiddenPickup(driverCity,c))return; // hard geographic rule
        const toDest=haversine(co,dest);
        let score=haversine(cur,co)+toDest;
        // Penalize stops that are further from dest than driver's home — wrong direction
        if(toDest>driverDist*1.25) score+=5000;
        // Prefer primary city (Bydliště): penalise alternatives
        score+=ALT_PENALTY[idx];
        if(score<bestScore){bestScore=score;bestPass=p;bestCity=c;}
      });
    }
    if(!bestPass)break;
    chosen[bestPass.id]=bestCity;
    if(bestCity&&bestCity!==driverCity){
      if(route[route.length-1]!==bestCity)route.push(bestCity);
      cur=getCoords(bestCity)||cur;
    }
    rem=rem.filter(p=>p!==bestPass);
  }
  route.push('__DEST__');
  return{route,chosen};
}

function generateVariant(going,cars,dest,extra,oh,ecoMode) {
  if(!going.length||!cars.length) return null;
  const usable=cars.filter(c=>{if(!c.driverId) return false; return !!going.find(p=>p.id===c.driverId);});
  if(!usable.length) return null;
  let sorted=[...usable].sort((a,b)=>effectiveCapacity(b)-effectiveCapacity(a));
  let min=0,cap=0;
  for(const c of sorted){if(cap>=going.length)break;cap+=effectiveCapacity(c);min++;}
  const num=Math.min(sorted.length,min+extra);
  let active=ecoMode?[...usable].sort((a,b)=>(a.isEv?-1:b.isEv?1:0)||(a.consumption-b.consumption)).slice(0,num):sorted.slice(0,num);
  const groups=buildGroups(going,state.pairs);
  const asgn={};
  active.forEach(c=>{const d=going.find(p=>p.id===c.driverId);asgn[c.id]={car:c,driver:d,passengers:[]};});
  const assigned=new Set(active.map(c=>c.driverId));
  const unassigned=[];
  // earlyGroup: early passengers MUST go in an earlyGroup car.
  // Non-early passengers MAY also ride in an earlyGroup car (remaining seats are open to all).
  const earlyIds=new Set(state.earlyGroup);
  const carsFor=pid=>{
    if(earlyIds.size===0) return active;
    if(earlyIds.has(pid)) return active.filter(c=>earlyIds.has(c.driverId)); // early → only early cars
    return active; // non-early → any car (including early car if seats remain)
  };

  // Count how many USABLE cars (across all variants, not just current active)
  // can potentially serve a passenger. Using usable (not active) ensures that
  // passengers like Praha/Plzeň who only fit in 2 cars score lower than
  // Pelhřimov passengers who also have Honza Březina's car as an option.
  // Lower number = more constrained = processed first to reserve scarce slots.
  function numCompatCars(p){
    const allCars=earlyIds.size===0?usable:(earlyIds.has(p.id)?usable.filter(c=>earlyIds.has(c.driverId)):usable);
    return allCars.filter(c=>{
      const d=going.find(x=>x.id===c.driverId);
      return d?!isForbiddenAssignment(p,d.city1):true;
    }).length;
  }

  // Sort groups: most geographically constrained non-driver members first
  groups.sort((a,b)=>{
    const score=grp=>{
      const pax=grp.filter(p=>!usable.find(c=>c.driverId===p.id));
      if(!pax.length) return Infinity;
      return Math.min(...pax.map(p=>numCompatCars(p)));
    };
    return score(a)-score(b);
  });

  // Helper: try to assign a single passenger to the best available car (2-pass)
  function tryAssign(p){
    let best=null,bs=-Infinity;
    for(const pass of[1,2]){
      if(best)break;
      for(const c of carsFor(p.id)){
        const sl=asgn[c.id],av=effectiveCapacity(c)-1-sl.passengers.length;
        if(av<=0)continue;
        if(sl.driver&&isForbiddenAssignment(p,sl.driver.city1))continue;
        const detour=sl.driver?pickupDetour(p,sl.driver.city1,dest):9999;
        if(pass===1&&detour>=5000)continue;
        const sc=av*100-(pass===1?detour:minPickupDist(p,sl.driver?.city1||''));
        if(sc>bs){bs=sc;best=c;}
      }
    }
    if(best){asgn[best.id].passengers.push(p);assigned.add(p.id);return true;}
    return false;
  }

  groups.forEach(grp=>{
    const nd=grp.filter(p=>!assigned.has(p.id)); if(!nd.length) return;
    const existCar=active.find(c=>grp.some(p=>p.id===c.driverId));
    if(existCar){
      // compatible: anyone can ride in an earlyGroup car; only non-early can ride in a regular car
      const compatible=nd.filter(p=>earlyIds.size===0||earlyIds.has(existCar.driverId)||!earlyIds.has(p.id));
      // incompatible: early passengers who ended up assigned to a non-early car's group — redirect them
      const incompatible=nd.filter(p=>earlyIds.size>0&&!earlyIds.has(existCar.driverId)&&earlyIds.has(p.id));
      const sl=asgn[existCar.id],av=effectiveCapacity(existCar)-1-sl.passengers.length;
      compatible.slice(0,av).forEach(p=>{sl.passengers.push(p);assigned.add(p.id);});
      compatible.slice(av).forEach(p=>{if(!tryAssign(p))unassigned.push(p);});
      incompatible.forEach(p=>{if(!tryAssign(p))unassigned.push(p);});
    } else {
      // Sort group members by constraint before trying to place them
      const sorted=[...nd].sort((a,b)=>numCompatCars(a)-numCompatCars(b));
      sorted.forEach(p=>{if(!tryAssign(p))unassigned.push(p);});
    }
  });

  // Individual pass: anyone not yet assigned (sort most constrained first)
  going
    .filter(p=>!assigned.has(p.id))
    .sort((a,b)=>numCompatCars(a)-numCompatCars(b))
    .forEach(p=>{if(!tryAssign(p))unassigned.push(p);});

  // Deduplicate: a passenger can appear in unassigned from both the groups pass
  // and the individual pass — keep only one entry per person
  {const seen=new Set(); const u=[...unassigned]; unassigned.length=0; u.forEach(p=>{if(!seen.has(p.id)){seen.add(p.id);unassigned.push(p);}});}

  // ── Auto-expand: if any passengers remain unassigned, add cars one by one ──
  // Sorts remaining usable cars same way as original selection (eco→efficiency, else→capacity)
  const remainPool=ecoMode
    ?[...usable].sort((a,b)=>(a.isEv?-1:b.isEv?1:0)||(a.consumption-b.consumption)).filter(c=>!active.some(a=>a.id===c.id))
    :[...usable].sort((a,b)=>effectiveCapacity(b)-effectiveCapacity(a)).filter(c=>!active.some(a=>a.id===c.id));
  while(unassigned.length>0&&remainPool.length>0){
    const nextCar=remainPool.shift();
    const nd=going.find(p=>p.id===nextCar.driverId);
    active.push(nextCar);
    asgn[nextCar.id]={car:nextCar,driver:nd,passengers:[]};
    assigned.add(nextCar.driverId);
    const retry=unassigned.splice(0); // drain unassigned list
    retry.forEach(p=>{
      if(assigned.has(p.id))return;
      let best=null,bs=-Infinity;
      for(const pass of[1,2]){
        if(best)break;
        for(const c of carsFor(p.id)){
          const sl=asgn[c.id],av=effectiveCapacity(c)-1-sl.passengers.length;
          if(av<=0)continue;
          if(sl.driver&&isForbiddenAssignment(p,sl.driver.city1))continue;
          const detour=sl.driver?pickupDetour(p,sl.driver.city1,dest):9999;
          if(pass===1&&detour>=5000)continue;
          const sc=av*100-(pass===1?detour:minPickupDist(p,sl.driver?.city1||''));
          if(sc>bs){bs=sc;best=c;}
        }
      }
      if(best){asgn[best.id].passengers.push(p);assigned.add(p.id);}
      else unassigned.push(p);
    });
  }

  let totalKm=0,totalFuel=0,totalCost=0,hasCost=false;
  const fp=state.fuelPrices;
  const carResults=active.map(c=>{
    const sl=asgn[c.id]; if(!sl.driver) return null;
    const all=[sl.driver,...sl.passengers];
    const {route,chosen}=optimizeRouteFlex(sl.driver.city1,all,dest);
    const km=calcRouteKm(route,dest);
    const fuel=c.isEv?0:(km*c.consumption/100)*(1+oh/100);
    const pricePerL = c.isEv?0 : (c.fuelType==='diesel'&&fp.diesel?fp.diesel : (fp.petrol||0));
    const cost = (!c.isEv && pricePerL>0) ? Math.round(fuel*pricePerL) : null;
    if(cost!==null){totalCost+=cost;hasCost=true;}
    totalKm+=km; totalFuel+=fuel;
    const cmap={};
    all.forEach(p=>{const city=chosen[p.id]||p.city1;if(city)(cmap[city]=cmap[city]||[]).push(p);});
    return{car:c,driver:sl.driver,passengers:sl.passengers,route,km,fuel,cost,cmap,chosen};
  }).filter(Boolean);
  return{cars:carResults,totalKm,totalFuel:Math.round(totalFuel*10)/10,totalCost:hasCost?totalCost:null,unassigned,numCars:active.length,numPlanned:num,autoExpanded:active.length>num};
}

function runOptimize() {
  const going=state.passengers.filter(p=>p.going&&p.name.trim());
  const out=document.getElementById('result-output');
  if(!going.length){out.innerHTML=`<div class="warning-box">${t('warn_nop')}</div>`;switchTab('results');return;}
  if(!state.cars.length){out.innerHTML=`<div class="warning-box">${t('warn_nocar')}</div>`;switchTab('results');return;}
  if(!state.dest.lat){out.innerHTML=`<div class="warning-box">${t('warn_nodest')}</div>`;switchTab('results');return;}
  const oh=parseInt(document.getElementById('fuel-overhead').value)||20;
  const dest={lat:state.dest.lat,lng:state.dest.lng};
  const defs=[
    {lbl:'var_a_lbl',cls:'var-1',desc:'var_a_desc',extra:0,eco:false},
    {lbl:'var_b_lbl',cls:'var-2',desc:'var_b_desc',extra:1,eco:false},
    {lbl:'var_c_lbl',cls:'var-3',desc:'var_c_desc',extra:2,eco:false},
    {lbl:'var_d_lbl',cls:'var-4',desc:'var_d_desc',extra:0,eco:true},
    {lbl:'var_e_lbl',cls:'var-1',desc:'var_e_desc',extra:1,eco:true},
    {lbl:'var_f_lbl',cls:'var-2',desc:'var_f_desc',extra:2,eco:true},
  ];
  const variants=defs.map(d=>{const r=generateVariant(going,state.cars,dest,d.extra,oh,d.eco);return r?{...r,...d}:null;});
  const btn=document.getElementById('optimize-btn');
  if(btn) btn.textContent=t('opt_btn_done');
  state.optimized=true;
  document.getElementById('tab-results').classList.remove('disabled');
  out.innerHTML=variants.map(v=>v?renderVariant(v,dest):'').join('');
  switchTab('results');
}

function renderVariant(v,dest) {
  const fuelStr=v.totalFuel>0?t('res_fuel')(v.totalFuel):t('res_elec');
  const costStr=v.totalCost!==null?`<span style="font-weight:700;color:var(--gym-dark)">${t('res_total_cost')(v.totalCost)}</span>`:'';
  const warn=v.unassigned.length?`<div class="warning-box">${t('unassigned')(v.unassigned.length,v.unassigned.map(p=>p.name).join(', '))}</div>`:'';
  const expandNote=v.autoExpanded?`<div style="font-size:.78rem;color:#7a6200;background:#fffbe6;border:1px solid #ffe066;border-radius:7px;padding:6px 12px;margin-bottom:8px">⚠️ ${t('auto_expanded')(v.numPlanned,v.numCars)}</div>`:'';
  return `<div class="variant-card">
    <div class="variant-header">
      <span class="variant-badge ${v.cls}">${t(v.lbl)}</span>
      <span class="variant-desc">${t(v.desc)}</span>
      <div class="variant-stats">
        <span>${t('res_cars')(v.numCars)}</span><span>${t('res_km')(v.totalKm)}</span><span>${fuelStr}</span>${costStr}
      </div>
    </div>
    <div class="variant-body">${expandNote}${warn}${v.cars.map(cr=>renderCarResult(cr,dest)).join('')}</div>
  </div>`;
}

function renderCarResult(cr,dest) {
  const all=[cr.driver,...cr.passengers];
  const effCap=effectiveCapacity(cr.car);
  const ftLabel = cr.car.isEv ? '' : (cr.car.fuelType==='diesel' ? ` ${t('ft_diesel')}` : ` ${t('ft_petrol')}`);
  const fuelStr = cr.car.isEv ? t('res_elec') : `⛽ ~${Math.round(cr.fuel*10)/10}l${ftLabel}${cr.cost!==null?` · ${t('res_cost')(cr.cost)}`:''}`;

  const stopsHtml=cr.route.map((city,i)=>{
    if(city==='__DEST__') return `<div class="route-stop">
      <div class="stop-dot sd-dest">🏁</div>
      <div class="stop-info"><div class="city">${state.dest.text}</div><div class="ppl">${t('res_dest')}</div></div></div>`;
    const ppl=(cr.cmap[city]||[]);
    const pplStr=ppl.map(p=>`${p.id===cr.driver.id?'🚗':'👤'} ${p.name}`).join(' · ');
    let kmStr='';
    if(i<cr.route.length-1){
      const nx=cr.route[i+1];
      const ac=getCoords(city),bc=nx==='__DEST__'?dest:getCoords(nx);
      if(ac&&bc)kmStr=`<span class="km-tag">→ ~${Math.round(haversine(ac,bc))} km</span>`;
    }
    return `<div class="route-stop">
      <div class="stop-dot ${i===0?'sd-start':'sd-pickup'}">${i+1}</div>
      <div class="stop-info"><div class="city">${city}</div><div class="ppl">${pplStr||'—'}</div></div>
      ${kmStr}</div>`;
  }).join('');
  return `<div class="car-assign">
    <div class="ca-header">
      <div style="font-size:1.1rem">🚙</div>
      <div class="ca-name">${cr.car.nameInput||cr.car.model||'Auto'}</div>
      <div class="ca-meta">
        <span>👥 ${all.length}/${effCap}</span><span>📍 ~${cr.km} km</span><span>${fuelStr}</span>
      </div>
    </div>
    <div class="ca-body">${stopsHtml}</div>
  </div>`;
}

];
const RLUGGAGE = ['trunk','trunk','trunk','roofbox','seats'];

function rnd(n){ return Math.floor(Math.random()*n); }
function rndPick(arr){ return arr[rnd(arr.length)]; }
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=rnd(i+1);[a[i],a[j]]=[a[j],a[i]];} return a; }

function generateDemoPeople() {
  const count = 8 + rnd(7); // 8–14 people
  const usedNames = new Set();
  const people = [];
  for(let i=0;i<count;i++){
    let name, tries=0;
    do {
      const male = Math.random()>0.45;
      const first = rndPick(male?RNAMES_M:RNAMES_F);
      const last  = rndPick(RSURNAMES);
      name = `${first} ${last}`;
      tries++;
    } while(usedNames.has(name) && tries<20);
    usedNames.add(name);
    const city1 = rndPick(RCITIES);
    const altCities = RCITIES.filter(c=>c!==city1);
    const city2 = Math.random()<0.3 ? rndPick(altCities) : '';
    const city3 = city2 && Math.random()<0.15 ? rndPick(altCities.filter(c=>c!==city2)) : '';
    const going = Math.random() > 0.12; // ~12% not going
    people.push({name, going, city1, city2, city3, driver: false});
  }
  // assign enough drivers: at least ceil(goingCount / 4) so everyone fits
  const goingIdx = people.map((_,i)=>i).filter(i=>people[i].going);
  const minDrivers = Math.ceil(goingIdx.length / 4);
  const numDrivers = Math.min(goingIdx.length, minDrivers + rnd(2));
  shuffle(goingIdx).slice(0, numDrivers).forEach(i => people[i].driver=true);
  return people;
}

function generateDemoCars(drivers, goingCount) {
  // need enough cars to seat all going passengers (avg effective capacity ~4 per car)
  const minCars = Math.ceil(goingCount / 4);
  const numCars = Math.min(drivers.length, minCars + rnd(2)); // min needed + 0–1 extra
  const pickedCars = shuffle([...RCARS]).slice(0, numCars);
  const driverList = shuffle(drivers).slice(0, numCars);
  return pickedCars.map((car, i) => ({
    ...car,
    fuelType: car.isEv ? 'electric' : detectFuelType(car.nameInput),
    luggage: rndPick(RLUGGAGE),
    comfort: Math.random() < 0.25,
    driverId: driverList[i]?.id || null,
  }));
}

function fillDemo(tab) {
  if(tab==='passengers'){
    if(state.passengers.some(p=>p.name.trim())&&!confirm(t('confirm_pass'))) return;
    state.passengers=[];state.nextId=1;
    generateDemoPeople().forEach(d=>state.passengers.push({id:state.nextId++,...d}));
    state.passengers.push({id:state.nextId++,name:'',going:true,city1:'',city2:'',city3:''});
    renderPassengerTable();
  }
  if(tab==='cars'){
    const going=state.passengers.filter(p=>p.going&&p.name.trim());
    if(!going.length){alert(t('alert_nopass'));return;}
    if(state.cars.length&&!confirm(t('confirm_cars'))) return;
    state.cars=[];
    // mark drivers on going list based on driver flag from demo generation
    const driverGoing = going.filter(p=>state.passengers.find(x=>x.id===p.id)?.driver);
    const drivers = driverGoing.length >= 2 ? driverGoing : going.slice(0, Math.ceil(going.length/4)+1);
    const demoCars = generateDemoCars(drivers, going.length);
    const max=Math.max(1,Math.floor(going.length/2));
    demoCars.slice(0,max).forEach((d,i)=>state.cars.push({
      id:state.nextId++,
      driverId: drivers[i]?.id || null,
      ...d
    }));
    renderCars();
  }
  if(tab==='settings'){
    document.getElementById('dest-input').value='Preunegg 66, 8973 Pichl bei Schladming';
    state.dest={text:'Preunegg 66, 8973 Pichl bei Schladming',lat:47.3906,lng:13.6897,resolved:true};
    document.getElementById('dest-result').innerHTML=
      `<span style="color:var(--gym-dark)">${t('dest_coords')(47.3906,13.6897)} — Preunegg 66, Pichl bei Schladming</span>`;
    const going=state.passengers.filter(p=>p.going&&p.name.trim());
    if(going.length>=2&&!state.pairs.length){
      const p=going.find(x=>x.name.includes('Petr')),m=going.find(x=>x.name.includes('Marie'));
      if(p&&m) state.pairs.push({id:state.nextId++,p1id:p.id,p2id:m.id,alsoReturn:true});
      else state.pairs.push({id:state.nextId++,p1id:going[0].id,p2id:going[1].id,alsoReturn:false});
      refreshPairSelects();
    }
  }
}
